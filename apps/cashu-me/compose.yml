services:
  tor:
    image: containers.torproject.org/tpo/onion-services/onimages/tor:alpine
    container_name: cashu-me-tor
    labels:
      yantr.app: "cashu-me"
      yantr.service: "Tor SOCKS Proxy"
    restart: unless-stopped
    networks:
      - cashu-me
    volumes:
      - tor-keys:/var/lib/tor
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        echo "SOCKSPort 0.0.0.0:9050" > /tmp/torrc && exec tor -f /tmp/torrc

  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cashu-me
    labels:
      yantr.app: "cashu-me"
      yantr.service: "Web UI"
    restart: unless-stopped
    networks:
      - cashu-me
    ports:
      - "3000:80"
    environment:
      - HTTP_PROXY=socks5://tor:9050
      - HTTPS_PROXY=socks5://tor:9050
    depends_on:
      - tor

networks:
  cashu-me:

volumes:
  tor-keys:
