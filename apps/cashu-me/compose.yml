services:
  tor:
    image: petee/doonion:latest
    container_name: cashu-me-tor
    labels:
      yantr.app: "cashu-me"
      yantr.service: "Tor Onion Service"
    restart: unless-stopped
    volumes:
      - tor-keys:/var/lib/tor
    environment:
      - SERVICE_HOST=0.0.0.0
      - SERVICE_PORT=3000

  web:
    build:
      context: https://github.com/cashubtc/cashu.me.git#main
      dockerfile: Dockerfile
    container_name: cashu-me
    labels:
      yantr.app: "cashu-me"
      yantr.service: "Web UI"
    restart: unless-stopped
    ports:
      - "3000"

volumes:
  tor-keys:
