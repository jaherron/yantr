services:
  ollama:
    image: ollama/ollama:latest
    container_name: ollama-nvidia
    runtime: nvidia

    labels:
      yantr.app: "ollama-nvidia"
      yantr.service: "Ollama with NVIDIA GPU"

    environment:
      OLLAMA_HOST: "0.0.0.0"
      NVIDIA_VISIBLE_DEVICES: "all"
      OLLAMA_NUM_GPU: "999"

    ports:
      - "11434:11434"

    volumes:
      - ollama_data:/root/.ollama

    restart: unless-stopped

    networks:
      - ollama_network

volumes:
  ollama_data:

networks:
  ollama_network:
    name: ollama_network
