version: '3.8'
services:
  ollama:
    image: ollama/ollama:latest
    container_name: ollama-nvidia
    runtime: nvidia
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - OLLAMA_HOST=0.0.0.0:11434
      - TZ=${TZ:-UTC}
    volumes:
      - ollama-nvidia-models:/root/.ollama
    ports:
      - "11434:11434"
    restart: unless-stopped
    labels:
      yantr.app: "ollama-nvidia"
      yantr.service: "Ollama with NVIDIA GPU"

volumes:
  ollama-nvidia-models:
    name: ollama-nvidia-models
