version: '3.8'
services:
  ollama:
    image: ollama/ollama:latest
    container_name: ollama-amd
    environment:
      - OLLAMA_HOST=0.0.0.0:11434
      - TZ=${TZ:-UTC}
    volumes:
      - ollama-amd-models:/root/.ollama
    ports:
      - "11434:11434"
    restart: unless-stopped
    labels:
      yantr.app: "ollama-amd"
      yantr.service: "Ollama with AMD GPU"
    devices:
      - /dev/kfd
      - /dev/dri

volumes:
  ollama-amd-models:
    name: ollama-amd-models

networks:
  ollama_network:
    name: ollama_network
