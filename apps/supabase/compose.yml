services:
  supabase-db:
    image: postgres:15-alpine
    container_name: supabase-db
    restart: unless-stopped
    labels:
      yantr.app: "supabase"
      yantr.service: "Database"
    environment:
      POSTGRES_USER: "postgres"
      POSTGRES_PASSWORD: "changeme"
      POSTGRES_DB: "postgres"
    volumes:
      - supabase_db:/var/lib/postgresql/data

  supabase:
    image: supabase/supabase:latest
    container_name: supabase
    restart: unless-stopped
    labels:
      yantr.app: "supabase"
      yantr.service: "Web UI"
    depends_on:
      - supabase-db
    ports:
      - "54321:3000"
    environment:
      SUPABASE_DB_HOST: "supabase-db"
      SUPABASE_DB_USER: "postgres"
      SUPABASE_DB_PASSWORD: "changeme"
      SUPABASE_DB_NAME: "postgres"
      SUPABASE_JWT_SECRET: "supersecretjwt"
      SUPABASE_URL: "http://localhost:54321"
    volumes:
      - supabase_config:/var/lib/supabase

volumes:
  supabase_db:
  supabase_config:
