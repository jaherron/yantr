services:
  miniflux-db:
    image: postgres:15-alpine
    container_name: miniflux-db
    restart: unless-stopped
    labels:
      yantr.app: "miniflux"
      yantr.service: "Database"
    environment:
      POSTGRES_USER: "miniflux"
      POSTGRES_PASSWORD: "changeme"
      POSTGRES_DB: "miniflux"
    volumes:
      - miniflux_db:/var/lib/postgresql/data

  miniflux:
    image: miniflux/miniflux:latest
    container_name: miniflux
    restart: unless-stopped
    labels:
      yantr.app: "miniflux"
      yantr.service: "Web UI"
    depends_on:
      - miniflux-db
    ports:
      - "8080"
    environment:
      DATABASE_URL: "postgres://miniflux:changeme@miniflux-db:5432/miniflux?sslmode=disable"
      RUN_MIGRATIONS: "true"
      ADMIN_USERNAME: "admin"
      ADMIN_PASSWORD: "changeme"
      BASE_URL: "http://localhost:8080"
    volumes:
      - miniflux_data:/var/lib/miniflux

volumes:
  miniflux_db:
  miniflux_data:
